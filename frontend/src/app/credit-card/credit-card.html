<div class="min-h-screen p-6 md:p-10">
  <div class="max-w-6xl mx-auto">
    <div class="mb-8 text-center">
      <h1 class="text-4xl font-bold text-slate-800 tracking-tight">Tarjetas de Crédito</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Formulario -->
      <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
        <div class="flex items-center gap-2 mb-6">
          <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center">
            <lucide-icon [img]="CardIcon" class="w-5 h-5 text-indigo-600" />
          </div>
          <h2 class="text-xl font-semibold text-slate-800">Agregar tarjeta</h2>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Titular</label>
            <div class="relative">
              <lucide-icon
                [img]="User"
                class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
              />
              <input
                type="text"
                formControlName="titular"
                placeholder="Nombre completo"
                class="w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Número de tarjeta</label>
            <div class="relative">
              <lucide-icon
                [img]="CardIcon"
                class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
              />
              <input
                type="text"
                formControlName="numero"
                placeholder="0000 0000 0000 0000"
                maxlength="19"
                class="w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
              />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Vencimiento</label>
              <div class="relative">
                <lucide-icon
                  [img]="Calendar"
                  class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                />
                <input
                  type="text"
                  formControlName="fecha"
                  placeholder="MM/YY"
                  maxlength="5"
                  class="w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                />
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">CVV</label>
              <div class="relative">
                <lucide-icon
                  [img]="Key"
                  class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                />
                <input
                  type="text"
                  formControlName="cvv"
                  placeholder="123"
                  maxlength="4"
                  class="w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                />
              </div>
            </div>
          </div>

          <button
            type="submit"
            [disabled]="form.invalid"
            class="mt-2 flex items-center justify-center gap-2 bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 active:bg-indigo-800 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-sm"
          >
            <lucide-icon [img]="Database" class="w-4 h-4" />
            Guardar tarjeta
          </button>
        </form>
      </div>

      <!-- Listado -->
      <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center">
              <lucide-icon [img]="CardIcon" class="w-5 h-5 text-emerald-600" />
            </div>
            <h2 class="text-xl font-semibold text-slate-800">Listado</h2>
          </div>
          <span class="text-sm text-slate-500 bg-slate-100 px-2.5 py-1 rounded-full">
            {{ listCards.length }} tarjeta(s)
          </span>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-slate-700">
            <thead>
              <tr
                class="text-left text-xs uppercase tracking-wider text-slate-500 border-b border-slate-200"
              >
                <th class="pb-3 px-2 font-semibold">Titular</th>
                <th class="pb-3 px-2 font-semibold">Número</th>
                <th class="pb-3 px-2 font-semibold">Vence</th>
                <th class="pb-3 px-2 text-right">Acciones</th>
              </tr>
            </thead>
            <tbody>
              @for (card of listCards; track card.numberCard; let i = $index) {
                <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                  <td class="py-3 px-2">
                    <div class="flex items-center gap-2">
                      <div
                        class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white text-xs font-semibold"
                      >
                        {{ card.namePerson.charAt(0) }}
                      </div>
                      <span class="font-medium">{{ card.namePerson }}</span>
                    </div>
                  </td>
                  <td class="py-3 px-2 font-mono text-sm">{{ card.numberCard }}</td>
                  <td class="py-3 px-2 text-sm">{{ card.expirationDate }}</td>
                  <td class="py-3 px-2">
                    <div class="flex items-center justify-end gap-1">
                      <button
                        class="p-1.5 rounded-md text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 transition"
                      >
                        <lucide-icon [img]="Pencil" class="w-4 h-4" />
                      </button>
                      <button
                        class="p-1.5 rounded-md text-slate-500 hover:bg-red-50 hover:text-red-600 transition"
                      >
                        <lucide-icon [img]="Trash2" class="w-4 h-4" />
                      </button>
                    </div>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
